<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strona nie została znaleziona — Patent na Podróż</title>
<meta name="robots" content="noindex">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #16385C 0%, #1f4a73 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #fff; text-align: center; padding: 24px;
  }
  .wrap { max-width: 480px; }
  .mark { width: 84px; height: 84px; margin: 0 auto 28px; }
  h1 { font-size: 84px; margin: 0 0 8px; color: #E8944A; letter-spacing: 2px; }
  h2 { font-size: 22px; margin: 0 0 12px; font-weight: 600; }
  p { font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.8); margin: 0 0 28px; }
  a.btn {
    display: inline-block; background: #E8944A; color: #16385C; font-weight: 700;
    padding: 13px 28px; border-radius: 999px; text-decoration: none; font-size: 15px;
    transition: transform 0.15s ease;
  }
  a.btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="28" stroke="#E8944A" stroke-width="2.6"></circle>
      <circle cx="32" cy="4.2" r="1.7" fill="#E8944A"></circle><circle cx="32" cy="59.8" r="1.7" fill="#E8944A"></circle>
      <circle cx="4.2" cy="32" r="1.7" fill="#E8944A"></circle><circle cx="59.8" cy="32" r="1.7" fill="#E8944A"></circle>
      <path d="M32 12 L38.5 32 L32 28.5 L25.5 32 Z" fill="#E8944A"></path>
      <path d="M32 52 L38.5 32 L32 35.5 L25.5 32 Z" fill="#fff"></path>
      <circle cx="32" cy="32" r="2.4" fill="#fff"></circle>
    </svg>
    <h1>404</h1>
    <h2>Ta strona zgubiła się w podróży</h2>
    <p>Nie mogliśmy znaleźć strony, której szukasz. Może zniknęła, może nigdy nie istniała — wracamy na właściwy szlak.</p>
    <a class="btn" href="/">Wróć na stronę główną</a>
  </div>
</body>
</html>
